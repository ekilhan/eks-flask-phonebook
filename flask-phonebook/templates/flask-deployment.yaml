apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: {{ .Values.flask.replicaCount }}
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: {{ .Values.flask.image }}
          ports:
            - containerPort: 80
          env:
            - name: MYSQL_HOST
              value: {{ .Values.mysql.mysqlHost }}
            - name: MYSQL_USER
              value: root
            - name: MYSQL_PASSWORD
              value: {{ .Values.mysql.rootPassword }}
            - name: MYSQL_DB
              value: {{ .Values.mysql.database }}
            - name: MYSQL_PORT
              value: {{ .Values.mysql.port | quote }}
